<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>闺蜜首页调试稿</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --ink: #171210;
        --paper: #fbf6ee;
        --cream: #fffaf2;
        --wine: #7f1019;
        --mist: #e2edf0;
        --mist-ink: #23445f;
        --line: rgba(23, 18, 16, 0.16);
        --stage-bg: #eee8df;
        --cover-start: #fbf6ee;
        --cover-end: #e8ded2;
        --cover-a: rgba(251, 246, 238, 0.96);
        --cover-b: rgba(251, 246, 238, 0.68);
        --cover-c: rgba(251, 246, 238, 0.08);
        --photo-a: rgba(251, 246, 238, 0.82);
        --photo-b: rgba(251, 246, 238, 0.84);
        --photo-c: rgba(251, 246, 238, 0.46);
        --glass: rgba(255, 248, 236, 0.82);
        --glass-soft: rgba(255, 248, 236, 0.66);
        --glass-strong: rgba(255, 248, 236, 0.93);
        --tag-bg: rgba(127, 16, 25, 0.84);
      }

      body[data-theme="pink"] {
        --ink: #25161b;
        --paper: #fff3f4;
        --cream: #fff8f7;
        --wine: #a73358;
        --mist: #f4dce4;
        --mist-ink: #7e2945;
        --line: rgba(80, 35, 47, 0.14);
        --stage-bg: #f0e1e3;
        --cover-start: #fff3f4;
        --cover-end: #ead4d8;
        --cover-a: rgba(255, 243, 244, 0.96);
        --cover-b: rgba(255, 243, 244, 0.68);
        --cover-c: rgba(255, 243, 244, 0.08);
        --photo-a: rgba(255, 243, 244, 0.78);
        --photo-b: rgba(255, 243, 244, 0.82);
        --photo-c: rgba(255, 243, 244, 0.42);
        --glass: rgba(255, 248, 248, 0.82);
        --glass-soft: rgba(255, 248, 248, 0.68);
        --glass-strong: rgba(255, 248, 248, 0.94);
        --tag-bg: rgba(167, 51, 88, 0.84);
      }

      body[data-theme="cool"] {
        --ink: #edf7fb;
        --paper: #0d1b26;
        --cream: #e8f3f7;
        --wine: #7ad7ff;
        --mist: #14364b;
        --mist-ink: #c8f0ff;
        --line: rgba(200, 240, 255, 0.2);
        --stage-bg: #111b24;
        --cover-start: #102331;
        --cover-end: #09141d;
        --cover-a: rgba(13, 31, 43, 0.72);
        --cover-b: rgba(13, 31, 43, 0.38);
        --cover-c: rgba(13, 31, 43, 0.08);
        --photo-a: rgba(8, 20, 30, 0.28);
        --photo-b: rgba(8, 20, 30, 0.55);
        --photo-c: rgba(8, 20, 30, 0.2);
        --glass: rgba(18, 47, 66, 0.76);
        --glass-soft: rgba(18, 47, 66, 0.62);
        --glass-strong: rgba(18, 47, 66, 0.94);
        --tag-bg: rgba(90, 199, 246, 0.28);
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--stage-bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      }

      .stage {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(360px, 430px) minmax(280px, 420px);
        gap: 34px;
        align-items: start;
        justify-content: center;
        padding: 34px;
      }

      .phone {
        width: 390px;
        min-height: 844px;
        border-radius: 34px;
        overflow: hidden;
        background: #111;
        border: 8px solid #151210;
        box-shadow: 0 26px 72px rgba(22, 18, 16, 0.28);
      }

      .screen {
        min-height: 828px;
        background: var(--paper);
      }

      .cover {
        position: relative;
        min-height: 828px;
        overflow: hidden;
        background:
          linear-gradient(90deg, var(--cover-a) 0%, var(--cover-b) 39%, var(--cover-c) 72%),
          linear-gradient(180deg, var(--cover-start) 0%, var(--cover-end) 100%);
      }

      .cover::before {
        content: "";
        position: absolute;
        inset: 18px;
        z-index: 6;
        border: 1px solid rgba(255, 248, 236, 0.8);
        border-radius: 26px;
        pointer-events: none;
      }

      .cover::after {
        content: "";
        position: absolute;
        left: 21px;
        top: 22px;
        bottom: 22px;
        z-index: 7;
        width: 4px;
        border-radius: 999px;
        background: var(--wine);
      }

      .model {
        position: absolute;
        right: -38px;
        bottom: -34px;
        z-index: 1;
        width: 350px;
        height: 690px;
        object-fit: cover;
        object-position: center top;
      }

      .photo-soften {
        position: absolute;
        inset: 0;
        z-index: 2;
        background:
          linear-gradient(180deg, var(--photo-a) 0%, rgba(251, 246, 238, 0) 28%, rgba(251, 246, 238, 0.16) 100%),
          linear-gradient(90deg, var(--photo-b) 0%, var(--photo-c) 41%, rgba(251, 246, 238, 0.03) 70%);
        pointer-events: none;
      }

      .topbar {
        position: absolute;
        left: 38px;
        right: 116px;
        top: 26px;
        z-index: 8;
        display: block;
      }

      .date {
        color: var(--wine);
        font-size: 12px;
        font-weight: 900;
      }

      .weather-line,
      .chip,
      .scenario {
        backdrop-filter: blur(10px);
      }

      .weather-line {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        max-width: 146px;
        margin-top: 7px;
        padding: 0 8px;
        border-radius: 999px;
        background: var(--glass);
        border: 1px solid rgba(23, 18, 16, 0.1);
        color: var(--ink);
        font-size: 10px;
        font-weight: 900;
        white-space: nowrap;
      }

      .chips {
        position: absolute;
        left: 38px;
        right: 28px;
        top: 82px;
        z-index: 8;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        background: var(--glass);
        border: 1px solid rgba(23, 18, 16, 0.1);
        color: var(--ink);
        font-size: 11px;
        font-weight: 900;
      }

      .chip.primary {
        background: var(--mist);
        color: var(--mist-ink);
      }

      .chip.select {
        min-height: 24px;
        max-width: 78px;
        padding: 0 7px;
        gap: 5px;
        font-size: 10px;
        white-space: nowrap;
        cursor: pointer;
      }

      .chip.select::after {
        content: "v";
        color: currentColor;
        font-size: 10px;
      }

      .theme-menu {
        position: absolute;
        right: 28px;
        top: 53px;
        z-index: 10;
        width: 112px;
        border-radius: 18px;
        padding: 6px;
        background: var(--glass-strong);
        border: 1px solid rgba(23, 18, 16, 0.1);
        box-shadow: 0 14px 34px rgba(23, 18, 16, 0.13);
        backdrop-filter: blur(14px);
        display: none;
      }

      .theme-menu.open {
        display: block;
      }

      .theme-control {
        position: absolute;
        right: 28px;
        top: 25px;
        z-index: 9;
      }

      .theme-option {
        min-height: 30px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 8px;
        color: var(--ink);
        font-size: 11px;
        font-weight: 900;
        cursor: pointer;
      }

      .theme-option.active {
        background: var(--mist);
        color: var(--mist-ink);
      }

      .theme-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        border: 1px solid rgba(23, 18, 16, 0.1);
      }

      .theme-dot.beige { background: #f4eadc; }
      .theme-dot.pink { background: #f3d9dd; }
      .theme-dot.cool { background: #20364f; }

      .scenario-tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: none;
      }

      .scenario-tabs::-webkit-scrollbar {
        display: none;
      }

      .scenario {
        flex: 0 0 auto;
        min-height: 34px;
        display: inline-flex;
        align-items: center;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid rgba(23, 18, 16, 0.12);
        background: var(--glass-soft);
        color: var(--ink);
        font-size: 12px;
        font-weight: 900;
      }

      .scenario.active {
        color: var(--cream);
        background: var(--wine);
        border-color: var(--wine);
      }

      .scenario.more {
        background: var(--glass);
      }

      .headline {
        position: absolute;
        left: 38px;
        top: 169px;
        z-index: 8;
        max-width: 194px;
        color: var(--wine);
        font-family: Georgia, "Times New Roman", "Songti SC", serif;
        font-size: 34px;
        line-height: 1.08;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      .mood {
        position: absolute;
        left: 39px;
        top: 279px;
        z-index: 8;
        color: var(--ink);
        font-size: 12px;
        font-weight: 800;
      }

      .reason-stack {
        position: absolute;
        left: 38px;
        top: 371px;
        z-index: 8;
        width: 126px;
      }

      .reason {
        display: grid;
        grid-template-columns: 24px 1fr;
        gap: 8px;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }

      .reason:last-child {
        border-bottom: 0;
      }

      .icon {
        font-size: 15px;
      }

      .reason strong {
        display: block;
        color: var(--ink);
        font-size: 12px;
        font-weight: 900;
      }

      .reason span {
        display: block;
        margin-top: 2px;
        color: var(--ink);
        opacity: 0.68;
        font-size: 9px;
        font-weight: 700;
      }

      .tag {
        position: absolute;
        z-index: 9;
        min-height: 30px;
        display: inline-flex;
        align-items: center;
        padding: 0 11px;
        border-radius: 999px;
        color: var(--cream);
        background: var(--tag-bg);
        font-size: 11px;
        font-weight: 900;
        backdrop-filter: blur(10px);
      }

      .tag.shoulder {
        right: 28px;
        top: 360px;
      }

      .tag.waist {
        right: 34px;
        top: 485px;
      }

      .look-code {
        position: absolute;
        left: 38px;
        bottom: 188px;
        z-index: 8;
        color: var(--ink);
        opacity: 0.62;
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      .palette {
        position: absolute;
        left: 38px;
        right: 34px;
        bottom: 151px;
        z-index: 9;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 7px;
      }

      .swatch {
        height: 8px;
        border-radius: 999px;
      }

      .swatch.cream { background: #f4eadc; }
      .swatch.sage { background: #9fb7aa; }
      .swatch.denim { background: #1f3e63; }

      .brand-mark {
        position: absolute;
        left: 28px;
        right: 18px;
        bottom: 34px;
        z-index: 8;
        color: color-mix(in srgb, var(--wine) 58%, transparent);
        font-family: Georgia, "Times New Roman", "Songti SC", serif;
        display: grid;
        grid-template-columns: 32px 1fr;
        gap: 8px;
        align-items: end;
      }

      .brand-cn {
        min-height: 98px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 9px 0;
        background: rgba(255, 248, 236, 0.24);
        border: 1px solid rgba(23, 18, 16, 0.06);
        color: color-mix(in srgb, var(--wine) 62%, transparent);
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        font-size: 15px;
        line-height: 1;
        font-weight: 950;
        gap: 4px;
      }

      .brand-en {
        display: block;
        width: 100%;
        font-size: 112px;
        line-height: 0.76;
        font-weight: 500;
        letter-spacing: -0.08em;
        transform: scaleX(1.08);
        transform-origin: left bottom;
      }

      .scene-panel {
        margin: 14px 14px 0;
        border-radius: 24px;
        background: var(--glass-strong);
        border: 1px solid rgba(23, 18, 16, 0.1);
        padding: 15px;
      }

      .scene-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .scene-panel-title {
        color: var(--wine);
        font-size: 13px;
        font-weight: 950;
      }

      .scene-panel-hint {
        color: var(--ink);
        opacity: 0.62;
        font-size: 11px;
        font-weight: 850;
      }

      .side {
        position: sticky;
        top: 34px;
        border-radius: 24px;
        background: #fff8ec;
        padding: 22px;
        box-shadow: 0 20px 55px rgba(23, 18, 16, 0.14);
      }

      .side h1 {
        margin: 0;
        font-size: 26px;
      }

      .side p,
      .side li {
        color: #675c55;
        font-size: 15px;
        line-height: 1.65;
      }

      .side ul {
        margin: 18px 0 0;
        padding-left: 18px;
      }

      @media (max-width: 820px) {
        .stage {
          display: block;
          padding: 0;
        }

        .phone {
          width: 100%;
          min-height: 100vh;
          border: 0;
          border-radius: 0;
          box-shadow: none;
        }

        .screen,
        .cover {
          min-height: 100vh;
        }

        .side {
          display: none;
        }
      }
    </style>
  </head>
  <body data-theme="beige">
    <main class="stage">
      <section class="phone" aria-label="闺蜜首页杂志封面预览">
        <div class="screen">
          <section class="cover">
            <img class="model" src="../assets/generated/tryon-model-transparent.png" alt="今日试穿模特图" />
            <div class="photo-soften"></div>

            <div class="topbar">
              <div class="date">5月23日 周六</div>
              <div class="weather-line">上海 27/18°C · 舒适微风</div>
            </div>

            <div class="chips">
              <div class="chip primary">天秤座幸运色：雾蓝</div>
            </div>

            <div class="theme-control">
              <div class="chip select" id="theme-toggle">主题：米色</div>
            </div>

            <div class="theme-menu" aria-label="页面主题选择">
              <div class="theme-option active" data-theme="beige" data-label="米色"><span class="theme-dot beige"></span>米色</div>
              <div class="theme-option" data-theme="pink" data-label="粉色"><span class="theme-dot pink"></span>粉色</div>
              <div class="theme-option" data-theme="cool" data-label="酷炫"><span class="theme-dot cool"></span>酷炫</div>
            </div>

            <div class="headline">薄外套 + 清爽内搭</div>
            <div class="mood">今天走温柔但有边界感</div>

            <div class="reason-stack">
              <div class="reason">
                <div class="icon">♙</div>
                <div>
                  <strong>比例</strong>
                  <span>优化肩胸比</span>
                </div>
              </div>
              <div class="reason">
                <div class="icon">◒</div>
                <div>
                  <strong>颜色</strong>
                  <span>雾蓝提升气质</span>
                </div>
              </div>
              <div class="reason">
                <div class="icon">◌</div>
                <div>
                  <strong>场景</strong>
                  <span>通勤约会都稳</span>
                </div>
              </div>
            </div>

            <div class="tag shoulder">补肩线</div>
            <div class="tag waist">高腰线</div>

            <div class="look-code">LOOK 01</div>
            <div class="palette" aria-label="今日配色">
              <div class="swatch cream"></div>
              <div class="swatch sage"></div>
              <div class="swatch denim"></div>
            </div>
            <div class="brand-mark">
              <span class="brand-cn"><span>闺</span><span>蜜</span></span>
              <span class="brand-en">MILI.</span>
            </div>
          </section>

          <section class="scene-panel">
            <div class="scene-panel-head">
              <div class="scene-panel-title">选择穿搭场景</div>
              <div class="scene-panel-hint">换场景，米粒重新搭</div>
            </div>
            <div class="scenario-tabs" aria-label="选择穿搭场景">
              <div class="scenario active">上班</div>
              <div class="scenario">约会</div>
              <div class="scenario">聚会</div>
              <div class="scenario">出游</div>
              <div class="scenario more">更多</div>
            </div>
          </section>
        </div>
      </section>

      <aside class="side">
        <h1>主题可切换</h1>
        <p>
          顶部保留日期和天气；主题入口默认收起，点击“主题：米色”可切换米色、粉色、酷炫三套封面风格。
        </p>
      </aside>
    </main>
    <script>
      const themeToggle = document.querySelector("#theme-toggle");
      const themeMenu = document.querySelector(".theme-menu");
      const themeOptions = document.querySelectorAll(".theme-option");

      themeToggle.addEventListener("click", () => {
        themeMenu.classList.toggle("open");
      });

      themeOptions.forEach((option) => {
        option.addEventListener("click", () => {
          document.body.dataset.theme = option.dataset.theme;
          themeToggle.textContent = `主题：${option.dataset.label}`;
          themeOptions.forEach((item) => item.classList.remove("active"));
          option.classList.add("active");
          themeMenu.classList.remove("open");
        });
      });

      document.addEventListener("click", (event) => {
        if (!themeMenu.contains(event.target) && !themeToggle.contains(event.target)) {
          themeMenu.classList.remove("open");
        }
      });
    </script>
  </body>
</html>
